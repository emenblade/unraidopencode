# Overlay: reach opencode over your private Tailscale network instead of
# publishing any port on the host. Nothing is exposed publicly.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.tailscale.yml up -d
#
# Then from your phone's Tailscale app, browse to http://opencode:4096
# (MagicDNS) or the tailnet IP shown in your Tailscale admin console.

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: opencode-tailscale
    hostname: opencode
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW

  opencode:
    network_mode: service:tailscale
    depends_on:
      - tailscale
    ports: []

volumes:
  tailscale-state:
