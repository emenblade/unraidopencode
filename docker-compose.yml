services:
  opencode:
    build: .
    image: opencode-mobile:latest
    container_name: opencode-mobile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ:-UTC}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${OPENCODE_PORT:-4096}:4096"
    volumes:
      - ./workspace:/workspace
      - opencode-config:/home/opencode/.config
      - opencode-data:/home/opencode/.local/share

volumes:
  opencode-config:
  opencode-data:
