services:
  opencode:
    image: ghcr.io/emenblade/opencode-mobile:latest
    build: .  # only used if you run `docker compose up --build` for local changes
    container_name: opencode-mobile
    restart: unless-stopped
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - TZ=${TZ:-UTC}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${OPENCODE_PORT:-4096}:4096"
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/workspace
      - ${APPDATA_PATH:-./appdata}:/home/opencode
