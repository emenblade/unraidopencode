services:
  opencode:
    build: .
    image: opencode-mobile:latest
    container_name: opencode-mobile
    restart: unless-stopped
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - TZ=${TZ:-UTC}
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${OPENCODE_PORT:-4096}:4096"
    volumes:
      - ${WORKSPACE_PATH:-./workspace}:/workspace
      - ${APPDATA_PATH:-./appdata}/config:/home/opencode/.config
      - ${APPDATA_PATH:-./appdata}/data:/home/opencode/.local/share
